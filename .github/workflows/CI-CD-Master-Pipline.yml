
name: .NET Core Desktop

on:
  push:
    branches:
    - "master"
  pull_request:
    branches: 
    - "master"

jobs:

  build-and-run:

    runs-on: ubuntu-latest


    steps:
    - uses: actions/checkout@v4
    - name: Settup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 8.0.x
    - name: Restore Dependencies
      run: dotnet restore ./BrainBuster/BrainBuster.csproj
    - name: Build
      run:  dotnet build ./BrainBuster/BrainBuster.csproj --no-restore
    - name: Test
      run: dotnet test ./BrainBuster/Tests/BrainBuster.Tests.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage"

