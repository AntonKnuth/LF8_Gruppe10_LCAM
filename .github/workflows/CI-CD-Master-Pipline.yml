
name: .NET Core Desktop

on:
  push:
    branches:
    - "master"
  pull_request:
    branches: 
    - "master"

jobs:

  build:

    runs-on: ubuntu-latest                    

    steps:
    - uses: actions/checkout@v4
    - name: Settup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 8.0.x
    - name: Restore Dependencies
      run: dotnet restore ./BrainBuster/BrainBusterV2.csproj
    - name: Build
      run:  dotnet build ./BrainBuster/BrainBusterV2.csproj --no-restore
    - name: Artifact Upload
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: ./        

  CI-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./
      - name: C# Lint
        run: dotnet format ./BrainBuster/BrainBusterV2.csproj -v detailed --verify-no-changes
      - name: Test
        run: dotnet test ./BrainBuster/BrainBusterV2.Tests/ --verbosity minimal
  Docker-Deploy:
     runs-on: ubuntu-latest
     needs: CI-test
     steps:
       - name: Download Build Artifact
         uses: actions/download-artifact@v4
         with:
           name: build-artifact
           path: ./
       - name: Login to DockerHub
         uses: docker/login-action@v3
         with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }} 
       - name: Build and push
         uses: docker/build-push-action@v6
         with:
           context: .
           file: ./BrainBuster/Dockerfile
           push: true
           tags: fiatmann/brainbuster:latest
