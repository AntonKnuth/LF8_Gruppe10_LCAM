
name: .NET Core Desktop

on:
  push:
    branches:
    - 'release/**'

jobs:

  build-and-test:

    runs-on: windows-latest
                           

    steps:
    - uses: actions/checkout@v4
    - name: Settup .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: 10.0.x
    - name: Restore Dependencies
      run: dotnet restore unit_test
    - name: Build
      run: dotnet build unit_test --no-restore
    - name: Test
      run: dotnet test unit_test --no-build --verbosity normal
    

