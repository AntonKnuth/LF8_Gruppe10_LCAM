<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Buster</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="nav">
            <a href="#" onclick="showView('home')">Home</a>
            <a href="#" onclick="showView('leaderboard')">Rangliste</a>
            <a href="#" onclick="showView('admin')">Admin</a>
            <span id="userInfo"></span>
        </div>

        <!-- Home -->
        <div id="home" class="view active">
            <h1>Brain Buster</h1>

            <div id="authBox">
                <h3>Login / Registrieren</h3>
                <input type="text" id="loginUser" placeholder="Username">
                <input type="password" id="loginPw" placeholder="Passwort">
                <button onclick="login()">Login</button>
                <button onclick="register()">Registrieren</button>
                <p id="authMsg"></p>
            </div>

            <div id="playerBox" class="hidden">
                <p>Eingeloggt: <b id="playerName"></b> | Punkte: <span id="playerScore">0</span></p>
                <button onclick="logout()">Ausloggen</button>
            </div>

            <hr>

            <h3>Neues Spiel</h3>
            <div id="guestDiv">
                <label>Name:</label>
                <input type="text" id="guestName" placeholder="Gast">
            </div>
            <label>Kategorie:</label>
            <select id="category"><option value="0">Alle</option></select>
            <label>Schwierigkeit:</label>
            <select id="difficulty">
                <option value="">Alle</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <label>Fragen:</label>
            <select id="questionCount">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="15">15</option>
            </select>
            <br><br>
            <button onclick="startGame()">Spiel starten</button>
        </div>

        <!-- Spiel -->
        <div id="game" class="view">
            <p>Frage <span id="qNum">1</span>/<span id="qTotal">10</span> | Punkte: <span id="score">0</span> | Streak: <span id="streak">0</span></p>
            <hr>
            <p id="questionText"></p>
            <div id="answers"></div>
            <div id="feedback" class="hidden">
                <p id="feedbackText"></p>
                <button onclick="nextQuestion()">Weiter</button>
            </div>
        </div>

        <!-- Ergebnis -->
        <div id="result" class="view">
            <h1>Fertig!</h1>
            <p><b id="finalScore">0</b> Punkte</p>
            <p>Richtig: <span id="finalCorrect">0</span>/<span id="finalTotal">0</span></p>
            <button onclick="startGame()">Nochmal</button>
            <button onclick="showView('leaderboard')">Rangliste</button>
            <button onclick="showView('home')">Home</button>
        </div>

        <!-- Rangliste -->
        <div id="leaderboard" class="view">
            <h2>Rangliste</h2>
            <table id="leaderboardTable">
                <thead><tr><th>Platz</th><th>Name</th><th>Punkte</th></tr></thead>
                <tbody></tbody>
            </table>
            <br>
            <button onclick="showView('home')">Zurueck</button>
        </div>

        <!-- Admin -->
        <div id="admin" class="view">
            <h2>Admin</h2>

            <div id="adminLogin">
                <input type="text" id="adminUser" placeholder="Admin Username">
                <input type="password" id="adminPw" placeholder="Passwort">
                <button onclick="adminLogin()">Login</button>
                <p id="adminMsg"></p>
            </div>

            <div id="adminPanel" class="hidden">
                <h3>Neue Frage</h3>
                <textarea id="newQuestion" placeholder="Fragetext"></textarea>
                <input type="text" id="correctAnswer" placeholder="Richtige Antwort">
                <textarea id="wrongAnswers" placeholder="Falsche Antworten (eine pro Zeile)"></textarea>
                <select id="newCategory"></select>
                <select id="newDifficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
                <br>
                <button onclick="addQuestion()">Speichern</button>
                <p id="addMsg"></p>
                <hr>
                <h3>Fragen</h3>
                <div id="questionsList"></div>
            </div>

            <br>
            <button onclick="showView('home')">Zurueck</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
